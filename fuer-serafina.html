<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar { display: none; }

  body {
    color: #e8e8e8;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.3s ease;
    background: #090909;
  }

  /* ── Ambient Particles ── */
  .ambient-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Side Nav ── */
  .side-nav {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .side-nav.visible { opacity: 1; }
  .side-nav a {
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    transition: all 0.4s ease;
    text-decoration: none;
  }
  .side-nav a.active {
    background: #fff;
    transform: scale(1.4);
  }

  /* ── Sections ── */
  section {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* ── Section 1 ── */
  #s1 .line {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    color: #555;
    text-align: center;
    line-height: 1.9;
    opacity: 0;
    transform: translateY(25px);
    transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #s1 .line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #s1 .line:last-child {
    color: #888;
  }

  .scroll-line {
    position: absolute;
    bottom: 3rem;
    width: 1px;
    height: 50px;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 1s ease 3s forwards;
  }
  .scroll-line::after {
    content: '';
    display: block;
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, #333, transparent);
    animation: scrollDrop 2s ease-in-out infinite;
  }

  /* ── Section 2 ── */
  #s2 .text-wrap {
    text-align: center;
    overflow: hidden;
  }
  #s2 .big {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(2.8rem, 10vw, 7rem);
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: #fff;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1), transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #s2 .big.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #s2 .big span {
    display: block;
  }
  #s2 .big .accent {
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: background 0.05s linear;
  }

  /* ── Section Countdown ── */
  .cd-wrap {
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .cd-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .cd-grid {
    display: flex;
    gap: clamp(1.5rem, 5vw, 3.5rem);
    align-items: flex-end;
  }
  .cd-block { text-align: center; }
  .cd-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(3rem, 12vw, 8rem);
    line-height: 1;
    color: #fff;
    letter-spacing: -0.03em;
    min-width: 1.2em;
    display: block;
  }
  .cd-block:first-child .cd-num {
    font-size: clamp(4rem, 16vw, 11rem);
  }
  .cd-unit {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(0.65rem, 1.5vw, 0.8rem);
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.8rem;
    display: block;
  }
  .cd-sep {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    color: #222;
    padding-bottom: 1.5rem;
  }
  .cd-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    color: #666;
    margin-top: 2rem;
    opacity: 0;
    transition: opacity 1s ease 0.6s;
  }
  .cd-wrap.visible .cd-sub { opacity: 1; }

  /* ── Section: Song ── */
  #songSection { min-height: 60vh; }
  .song-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8rem;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .song-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .song-label {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.8rem;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .song-info {
    text-align: center;
  }
  .song-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    color: #fff;
    margin-bottom: 0.4rem;
  }
  .song-artist {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.85rem;
    color: #555;
    letter-spacing: 0.05em;
  }
  .song-play {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid #222;
    background: #111;
    cursor: pointer;
    transition: all 0.4s ease;
    text-decoration: none;
  }
  .song-play:hover {
    border-color: #1DB954;
    box-shadow: 0 0 30px rgba(29, 185, 84, 0.15);
  }
  .song-play svg {
    width: 20px;
    height: 20px;
    fill: #888;
    margin-left: 2px;
    transition: fill 0.3s ease;
  }
  .song-play:hover svg { fill: #1DB954; }

  /* ── Section: Hold Me ── */
  .hold-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hold-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .hold-btn {
    width: clamp(140px, 35vw, 180px);
    height: clamp(140px, 35vw, 180px);
    border-radius: 50%;
    border: 1px solid #222;
    background: #111;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .hold-btn:hover { border-color: #333; }
  .hold-btn.active {
    border-color: #ff2d5520;
    box-shadow: 0 0 60px rgba(255, 45, 85, 0.15), 0 0 120px rgba(255, 45, 85, 0.05);
  }
  .hold-btn .heart-icon {
    font-size: clamp(2.5rem, 8vw, 3.5rem);
    transition: transform 0.3s ease;
    filter: grayscale(1) brightness(0.4);
  }
  .hold-btn.active .heart-icon {
    filter: none;
    animation: heartbeat 0.6s ease-in-out infinite;
  }
  .hold-label {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.8rem;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.4s ease;
  }
  .hold-btn.active ~ .hold-label { color: #555; }
  .hold-msg {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    color: #fff;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: center;
    max-width: 280px;
  }
  .hold-btn.active ~ .hold-msg {
    opacity: 1;
    transform: translateY(0);
  }
  .hold-pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(255, 45, 85, 0.2);
    opacity: 0;
    pointer-events: none;
  }
  .hold-btn.active .hold-pulse { animation: pulseRing 1.2s ease-out infinite; }
  .hold-btn.active .hold-pulse:nth-child(2) { animation-delay: 0.4s; }

  /* ── Section: Scratch ── */
  .scratch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .scratch-wrap.visible { opacity: 1; transform: translateY(0); }
  .scratch-canvas-wrap {
    position: relative;
    width: clamp(260px, 70vw, 380px);
    height: clamp(100px, 25vw, 140px);
    border-radius: 8px;
    overflow: hidden;
  }
  .scratch-reveal {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
  }
  .scratch-reveal-text {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 3.5vw, 1.8rem);
    color: #fff;
    text-align: center;
    padding: 1rem;
  }
  .scratch-canvas-wrap canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
    border-radius: 8px;
    cursor: crosshair;
    touch-action: none;
  }
  .scratch-label {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.8rem;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── Section: Envelope ── */
  .envelope-wrap {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  .envelope-wrap.visible { opacity: 1; transform: translateY(0); }

  .envelope-label {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.8rem;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .envelope {
    width: clamp(220px, 50vw, 300px);
    aspect-ratio: 1.5 / 1;
    position: relative;
    cursor: pointer;
    perspective: 600px;
  }

  .env-body {
    position: absolute;
    inset: 0;
    background: #151515;
    border: 1px solid #222;
    border-radius: 4px;
    z-index: 1;
    transition: border-color 0.4s ease;
  }
  .envelope:hover .env-body { border-color: #333; }

  .env-flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
    z-index: 3;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .env-flap svg { width: 100%; height: 100%; display: block; }

  .env-paper {
    position: absolute;
    left: 8%; right: 8%; bottom: 8%; top: 20%;
    background: #1a1a1a;
    border: 1px solid #1f1f1f;
    border-radius: 2px;
    z-index: 2;
    transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s, opacity 0.5s ease 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .env-paper-lines {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .env-paper-lines span {
    display: block;
    height: 1px;
    background: #282828;
    border-radius: 1px;
  }
  .env-paper-lines span:nth-child(1) { width: 50px; }
  .env-paper-lines span:nth-child(2) { width: 35px; }
  .env-paper-lines span:nth-child(3) { width: 42px; }

  .envelope.opened .env-flap { transform: rotateX(180deg); }
  .envelope.opened .env-paper { transform: translateY(-85%); opacity: 0; }

  /* ── Letter Overlay ── */
  .letter-content {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(9, 9, 9, 0);
    backdrop-filter: blur(0px);
    pointer-events: none;
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    padding: 1.5rem;
  }
  .letter-content.open {
    background: rgba(9, 9, 9, 0.95);
    backdrop-filter: blur(30px);
    pointer-events: all;
  }

  .letter {
    max-width: 520px;
    width: 100%;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
  }
  .letter-content.open .letter { opacity: 1; transform: translateY(0); }

  .letter-close {
    position: absolute;
    top: 2rem;
    right: 2rem;
    background: none;
    border: none;
    color: #333;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.5rem;
    min-width: 44px;
    min-height: 44px;
    transition: color 0.3s ease;
  }
  .letter-close:hover { color: #fff; }

  .letter-line {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4.5vw, 2.4rem);
    line-height: 1.7;
    color: #fff;
    min-height: 1.7em;
  }
  .letter-line .typewriter {
    display: inline;
    border-right: 2px solid transparent;
  }
  .letter-line .typewriter.typing {
    border-right-color: #555;
    animation: blink 0.6s step-end infinite;
  }

  .letter-spacer { height: 2.5rem; }

  .letter-sign {
    margin-top: 3rem;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.9rem;
    color: #555;
    letter-spacing: 0.08em;
    text-align: center;
    opacity: 0;
    transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── Kiss particles ── */
  .kiss-particle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 1.4rem;
    animation: kissFloat 1.5s ease-out forwards;
    user-select: none;
  }

  /* ── Cursor hearts (desktop) ── */
  .cursor-heart {
    position: fixed;
    pointer-events: none;
    z-index: 998;
    font-size: 0.7rem;
    opacity: 0.6;
    animation: cursorHeartFade 0.8s ease-out forwards;
    user-select: none;
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    section {
      padding: 1.5rem;
      padding-top: max(1.5rem, env(safe-area-inset-top));
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
    .side-nav { right: 0.8rem; gap: 10px; }
    .side-nav a { width: 5px; height: 5px; }
    #s1 .line { font-size: clamp(1.2rem, 5.5vw, 1.8rem); line-height: 2; }
    #s2 .big { font-size: clamp(2.4rem, 11vw, 4rem); }
    .cd-grid { gap: 0.8rem; }
    .cd-num { font-size: clamp(2.2rem, 10vw, 3.5rem); }
    .cd-block:first-child .cd-num { font-size: clamp(2.8rem, 13vw, 5rem); }
    .cd-sep { font-size: clamp(1.5rem, 5vw, 2.5rem); padding-bottom: 1rem; }
    .cd-unit { font-size: 0.6rem; margin-top: 0.5rem; }
    .hold-btn { width: 160px; height: 160px; }
    .scratch-canvas-wrap { width: min(85vw, 340px); height: 120px; }
    .envelope { width: min(70vw, 260px); }
    .letter-content { padding: 1rem; padding-top: max(1rem, env(safe-area-inset-top)); }
    .letter-close { top: max(1rem, env(safe-area-inset-top)); right: 1rem; font-size: 0.9rem; min-width: 48px; min-height: 48px; }
    .letter-line { font-size: clamp(1.3rem, 5vw, 1.8rem); line-height: 1.6; }
    .letter-spacer { height: 1.5rem; }
    .letter-sign { margin-top: 2rem; }
  }

  /* ── Animations ── */
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes scrollDrop {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  @keyframes pulseRing {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes kissFloat {
    0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5) rotate(20deg); }
  }
  @keyframes cursorHeartFade {
    0% { opacity: 0.6; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.3) translateY(-30px); }
  }
@keyframes blink {
    50% { border-right-color: transparent; }
  }
</style>
</head>
<body>

<!-- Ambient Particles -->
<canvas class="ambient-canvas" id="ambientCanvas"></canvas>

<!-- Side Navigation -->
<nav class="side-nav" id="sideNav">
  <a href="#s1" data-section="s1"></a>
  <a href="#s2" data-section="s2"></a>
  <a href="#countdown" data-section="countdown"></a>
  <a href="#songSection" data-section="songSection"></a>
  <a href="#holdSection" data-section="holdSection"></a>
  <a href="#scratchSection" data-section="scratchSection"></a>
  <a href="#s3" data-section="s3"></a>
</nav>

<section id="s1">
  <div>
    <div class="line">i got bored</div>
    <div class="line">just scroll down</div>
  </div>
  <div class="scroll-line"></div>
</section>

<section id="s2">
  <div class="text-wrap">
    <div class="big">
      <span>i genuinely</span>
      <span class="accent">miss you so bad</span>
      <span class="accent">mommy</span>
    </div>
  </div>
</section>

<section id="countdown">
  <div class="cd-wrap">
    <div class="cd-grid">
      <div class="cd-block">
        <span class="cd-num" id="cdDays"></span>
        <span class="cd-unit">days</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cdHours"></span>
        <span class="cd-unit">hrs</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cdMins"></span>
        <span class="cd-unit">min</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <span class="cd-num" id="cdSecs"></span>
        <span class="cd-unit">sec</span>
      </div>
    </div>
    <div class="cd-sub">till we finally can make out again</div>
  </div>
</section>

<section id="songSection">
  <div class="song-wrap">
    <div class="song-label">our song</div>
    <div class="song-info">
      <div class="song-title">He a Keeper</div>
      <div class="song-artist">Reignwolf</div>
    </div>
    <a class="song-play" href="https://open.spotify.com/search/He%20a%20Keeper%20Reignwolf" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
    </a>
  </div>
</section>

<section id="holdSection">
  <div class="hold-wrap">
    <div class="hold-btn" id="holdBtn">
      <div class="hold-pulse"></div>
      <div class="hold-pulse"></div>
      <span class="heart-icon">💣</span>
    </div>
    <div class="hold-label">hold me</div>
    <div class="hold-msg">im about to explode, wtf are you doing to me</div>
  </div>
</section>

<section id="scratchSection">
  <div class="scratch-wrap">
    <div class="scratch-label">scratch to reveal</div>
    <div class="scratch-canvas-wrap">
      <div class="scratch-reveal">
        <div class="scratch-reveal-text">ur mind & body be so hot, damn</div>
      </div>
      <canvas id="scratchCanvas"></canvas>
    </div>
  </div>
</section>

<section id="s3">
  <div class="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="env-body"></div>
      <div class="env-paper">
        <div class="env-paper-lines">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="env-flap">
        <svg viewBox="0 0 300 100" preserveAspectRatio="none">
          <polygon points="0,0 150,100 300,0" fill="#151515" stroke="#222" stroke-width="1"/>
        </svg>
      </div>
    </div>
    <div class="envelope-label">tap to open</div>
  </div>
</section>

<div class="letter-content" id="letterOverlay">
  <button class="letter-close" id="closeBtn">close</button>
  <div class="letter" id="letterContent">
    <div class="letter-line" data-text="ich vermiss dich so sehr serafina"></div>
    <div class="letter-spacer"></div>
    <div class="letter-line" data-text="kann es echt kaum erwarten,"></div>
    <div class="letter-line" data-text="dich wiederzusehen"></div>
    <div class="letter-spacer"></div>
    <div class="letter-line" data-text="i swear im the luckiest man alive"></div>
    <div class="letter-line" data-text="feel kissed tho"></div>
    <div class="letter-sign">- arne</div>
  </div>
</div>

<script>
// ── Ambient Particles ──
const ambCanvas = document.getElementById('ambientCanvas');
const ambCtx = ambCanvas.getContext('2d');
let particles = [];

function resizeAmbient() {
  ambCanvas.width = window.innerWidth;
  ambCanvas.height = window.innerHeight;
}
resizeAmbient();
window.addEventListener('resize', resizeAmbient);

for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.15,
    dy: (Math.random() - 0.5) * 0.1 - 0.05,
    o: Math.random() * 0.3 + 0.05
  });
}

function drawParticles() {
  ambCtx.clearRect(0, 0, ambCanvas.width, ambCanvas.height);
  particles.forEach(p => {
    ambCtx.beginPath();
    ambCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ambCtx.fillStyle = `rgba(255, 255, 255, ${p.o})`;
    ambCtx.fill();
    p.x += p.dx;
    p.y += p.dy;
    if (p.x < -10) p.x = ambCanvas.width + 10;
    if (p.x > ambCanvas.width + 10) p.x = -10;
    if (p.y < -10) p.y = ambCanvas.height + 10;
    if (p.y > ambCanvas.height + 10) p.y = -10;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Side nav ──
const sideNav = document.getElementById('sideNav');
const sections = document.querySelectorAll('section');
const navLinks = sideNav.querySelectorAll('a');
let navVisible = false;

function updateNav() {
  const scrollY = window.scrollY;
  const winH = window.innerHeight;

  if (scrollY > winH * 0.3 && !navVisible) {
    sideNav.classList.add('visible');
    navVisible = true;
  } else if (scrollY <= winH * 0.3 && navVisible) {
    sideNav.classList.remove('visible');
    navVisible = false;
  }

  let current = '';
  sections.forEach(s => {
    if (scrollY >= s.offsetTop - winH * 0.5) current = s.id;
  });
  navLinks.forEach(a => a.classList.toggle('active', a.dataset.section === current));
}

// ── Scroll-triggered fade in ──
const threshold = window.innerWidth <= 480 ? 0.15 : 0.35;
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold });

document.querySelectorAll('.big, .cd-wrap, .envelope-wrap, .hold-wrap, .scratch-wrap, .song-wrap').forEach(el => obs.observe(el));

// ── Scroll-based progressive glow ──
const accentEls = document.querySelectorAll('#s2 .big .accent');
const s2Section = document.getElementById('s2');

function updateGlow() {
  if (!accentEls.length || !s2Section) return;
  const rect = s2Section.getBoundingClientRect();
  const winH = window.innerHeight;
  const sectionCenter = rect.top + rect.height / 2;
  const viewCenter = winH / 2;
  const distance = Math.abs(sectionCenter - viewCenter);
  const progress = Math.max(0, Math.min(1, 1 - distance / winH));

  const r = Math.round(153 + (255 - 153) * progress);
  const g = Math.round(153 + (77 - 153) * progress);
  const b = Math.round(153 + (109 - 153) * progress);
  const grad = `linear-gradient(90deg, #fff 0%, rgb(${r},${g},${b}) 100%)`;

  accentEls.forEach(el => {
    el.style.background = grad;
    el.style.webkitBackgroundClip = 'text';
    el.style.backgroundClip = 'text';
  });

  const bigEl = accentEls[0].parentElement;
  if (bigEl) {
    const glowOpacity = progress * 0.25;
    bigEl.style.textShadow = progress > 0.1
      ? `0 0 40px rgba(255, 45, 85, ${glowOpacity}), 0 0 80px rgba(255, 45, 85, ${glowOpacity * 0.5})`
      : 'none';
  }
}

// ── Background warmth on scroll ──
function updateBgWarmth() {
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docH > 0 ? window.scrollY / docH : 0;
  // From #090909 cold to #0d0908 warm
  const r = Math.round(9 + 4 * progress);
  const g = Math.round(9 + 0 * progress);
  const b = Math.round(9 - 1 * progress);
  document.body.style.backgroundColor = `rgb(${r},${g},${b})`;
}

// ── Parallax ──
function updateParallax() {
  const scrollY = window.scrollY;
  sections.forEach(s => {
    const top = s.offsetTop;
    const offset = (scrollY - top) * 0.04;
    const child = s.firstElementChild;
    if (child && s.id !== 's1') {
      child.style.transform = `translateY(${offset}px)`;
    }
  });
}

function onScroll() {
  updateNav();
  updateGlow();
  updateBgWarmth();
  updateParallax();
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

// ── Countdown ──
const target = new Date('2026-03-23T00:00:00');
function pad(n) { return n < 10 ? '0' + n : n; }
function updateCountdown() {
  const diff = Math.max(0, target - new Date());
  document.getElementById('cdDays').textContent = Math.floor(diff / 864e5);
  document.getElementById('cdHours').textContent = pad(Math.floor((diff % 864e5) / 36e5));
  document.getElementById('cdMins').textContent = pad(Math.floor((diff % 36e5) / 6e4));
  document.getElementById('cdSecs').textContent = pad(Math.floor((diff % 6e4) / 1e3));
}
updateCountdown();
setInterval(updateCountdown, 1000);

// Section 1 auto-animate
window.addEventListener('load', () => {
  document.querySelectorAll('#s1 .line').forEach((line, i) => {
    setTimeout(() => line.classList.add('visible'), i * 500 + 400);
  });
});

// ── Envelope & Letter (typewriter) ──
const envelope = document.getElementById('envelope');
const letterOverlay = document.getElementById('letterOverlay');
const closeBtn = document.getElementById('closeBtn');
let letterOpen = false;

function typewriterLine(el, text, speed) {
  return new Promise(resolve => {
    const tw = document.createElement('span');
    tw.className = 'typewriter typing';
    el.appendChild(tw);
    let i = 0;
    function type() {
      if (i < text.length) {
        tw.textContent += text[i];
        i++;
        setTimeout(type, speed);
      } else {
        tw.classList.remove('typing');
        resolve();
      }
    }
    type();
  });
}

async function animateLetter() {
  const lines = document.querySelectorAll('.letter-line[data-text]');
  for (const line of lines) {
    await typewriterLine(line, line.dataset.text, 35);
    await new Promise(r => setTimeout(r, 200));
  }
  const sign = document.querySelector('.letter-sign');
  if (sign) {
    sign.style.opacity = '1';
    sign.style.transform = 'translateY(0)';
  }
}

function openEnvelope() {
  if (letterOpen) return;
  letterOpen = true;
  envelope.classList.add('opened');

  setTimeout(() => {
    letterOverlay.classList.add('open');
    setTimeout(animateLetter, 400);
  }, 700);
}

function closeLetter() {
  document.querySelectorAll('.letter-line[data-text]').forEach(l => {
    l.innerHTML = '';
  });
  const sign = document.querySelector('.letter-sign');
  if (sign) { sign.style.opacity = '0'; sign.style.transform = 'translateY(12px)'; }
  setTimeout(() => {
    letterOverlay.classList.remove('open');
    letterOpen = false;
  }, 300);
}

envelope.addEventListener('click', openEnvelope);
envelope.addEventListener('touchend', (e) => { e.preventDefault(); openEnvelope(); });
closeBtn.addEventListener('click', closeLetter);
closeBtn.addEventListener('touchend', (e) => { e.preventDefault(); closeLetter(); });
letterOverlay.addEventListener('click', (e) => { if (e.target === letterOverlay) closeLetter(); });

// ── Kiss particles ──
const kisses = ['\u{1F48B}', '\u{1F618}', '\u2665'];
document.addEventListener('click', (e) => {
  if (e.target.closest('button, .envelope, .hold-btn, canvas, .side-nav, .song-play')) return;
  for (let i = 0; i < 3; i++) {
    const k = document.createElement('span');
    k.className = 'kiss-particle';
    k.textContent = kisses[Math.floor(Math.random() * kisses.length)];
    k.style.left = (e.clientX + (Math.random() - 0.5) * 40) + 'px';
    k.style.top = (e.clientY + (Math.random() - 0.5) * 20) + 'px';
    document.body.appendChild(k);
    k.addEventListener('animationend', () => k.remove());
  }
});

// ── Cursor heart trail (desktop) ──
if (!('ontouchstart' in window)) {
  let lastTrail = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastTrail < 80) return;
    lastTrail = now;
    const h = document.createElement('span');
    h.className = 'cursor-heart';
    h.textContent = '\u2665';
    h.style.left = e.clientX + 'px';
    h.style.top = e.clientY + 'px';
    h.style.color = `hsl(${340 + Math.random() * 30}, 80%, ${50 + Math.random() * 20}%)`;
    document.body.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  });
}

// ── Hold button ──
const holdBtn = document.getElementById('holdBtn');
function startHold() {
  holdBtn.classList.add('active');
  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200, 100, 100, 50, 100, 50, 200]);
}
function stopHold() {
  holdBtn.classList.remove('active');
  if (navigator.vibrate) navigator.vibrate(0);
}
holdBtn.addEventListener('mousedown', startHold);
holdBtn.addEventListener('mouseup', stopHold);
holdBtn.addEventListener('mouseleave', stopHold);
holdBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startHold(); });
holdBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopHold(); });

// ── Scratch canvas ──
const scratchCanvas = document.getElementById('scratchCanvas');
const scratchCtx = scratchCanvas.getContext('2d');
let scratching = false, scratchRevealed = false;

function initScratch() {
  const wrap = scratchCanvas.parentElement;
  scratchCanvas.width = wrap.offsetWidth;
  scratchCanvas.height = wrap.offsetHeight;
  scratchCtx.fillStyle = '#1a1a1a';
  scratchCtx.fillRect(0, 0, scratchCanvas.width, scratchCanvas.height);
  scratchCtx.fillStyle = '#222';
  scratchCtx.font = '12px Inter';
  scratchCtx.textAlign = 'center';
  for (let y = 20; y < scratchCanvas.height; y += 25)
    for (let x = 30; x < scratchCanvas.width; x += 60)
      scratchCtx.fillText('\u2726', x + (y % 50 ? 15 : 0), y);
  scratchCtx.strokeStyle = '#333';
  scratchCtx.lineWidth = 0.5;
  scratchCtx.strokeRect(0, 0, scratchCanvas.width, scratchCanvas.height);
}

function scratch(x, y) {
  if (scratchRevealed) return;
  scratchCtx.globalCompositeOperation = 'destination-out';
  scratchCtx.beginPath();
  scratchCtx.arc(x, y, ('ontouchstart' in window) ? 30 : 22, 0, Math.PI * 2);
  scratchCtx.fill();
  const data = scratchCtx.getImageData(0, 0, scratchCanvas.width, scratchCanvas.height).data;
  let clear = 0;
  for (let i = 3; i < data.length; i += 4) if (data[i] === 0) clear++;
  if (clear / (data.length / 4) > 0.45) {
    scratchRevealed = true;
    scratchCanvas.style.transition = 'opacity 0.5s ease';
    scratchCanvas.style.opacity = '0';
  }
}

function getScratchPos(e) {
  const rect = scratchCanvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

scratchCanvas.addEventListener('mousedown', () => scratching = true);
scratchCanvas.addEventListener('mouseup', () => scratching = false);
scratchCanvas.addEventListener('mousemove', (e) => { if (scratching) scratch(...Object.values(getScratchPos(e))); });
scratchCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); scratching = true; });
scratchCanvas.addEventListener('touchend', () => scratching = false);
scratchCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(...Object.values(getScratchPos(e))); });

window.addEventListener('load', initScratch);
window.addEventListener('resize', () => { if (!scratchRevealed) initScratch(); });
</script>
</body>
</html>
